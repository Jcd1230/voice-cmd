name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-linux-x64:
    name: Build and Release (linux-x64)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            build-essential \
            meson \
            ninja-build \
            git \
            valac \
            libglib2.0-dev \
            gobject-introspection \
            libgirepository1.0-dev \
            libgtk-4-dev \
            libwayland-dev

      - name: Build and install gtk4-layer-shell
        run: |
          git clone --depth=1 https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
          meson setup /tmp/gtk4-layer-shell/build /tmp/gtk4-layer-shell \
            -Dintrospection=false \
            -Dexamples=false \
            -Dtests=false
          meson compile -C /tmp/gtk4-layer-shell/build
          sudo meson install -C /tmp/gtk4-layer-shell/build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        env:
          PKG_CONFIG_PATH: /usr/local/lib/x86_64-linux-gnu/pkgconfig:/usr/local/lib/pkgconfig:${{ env.PKG_CONFIG_PATH }}
        run: |
          cargo build --release --bin voice-cmd --bin voice-cmd-tts
          cargo build --release --bin voice-cmd-overlay --features overlay

      - name: Package release assets
        run: |
          mkdir -p dist
          cp target/release/voice-cmd dist/voice-cmd
          cp target/release/voice-cmd-overlay dist/voice-cmd-overlay
          cp target/release/voice-cmd-tts dist/voice-cmd-tts

          tar -C dist -czf dist/voice-cmd-linux-x64.tar.gz \
            voice-cmd \
            voice-cmd-overlay \
            voice-cmd-tts

          (cd dist && sha256sum \
            voice-cmd-linux-x64.tar.gz \
          > voice-cmd-linux-x64-checksums.txt)

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/voice-cmd-linux-x64.tar.gz
            dist/voice-cmd-linux-x64-checksums.txt
