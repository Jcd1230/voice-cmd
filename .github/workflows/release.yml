name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-linux-x64:
    name: Build and Release voice-cmd (linux-x64)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --bin voice-cmd

      - name: Package release assets
        run: |
          mkdir -p dist
          cp target/release/voice-cmd dist/voice-cmd

          tar -C dist -czf dist/voice-cmd-linux-x64.tar.gz voice-cmd

          (cd dist && sha256sum \
            voice-cmd-linux-x64.tar.gz \
          > voice-cmd-linux-x64-checksums.txt)

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/voice-cmd-linux-x64.tar.gz
            dist/voice-cmd-linux-x64-checksums.txt
